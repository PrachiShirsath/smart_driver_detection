    window.speechSynthesis.cancel();

function getBearing(p1, p2) {

    let lat1 = p1[0] * Math.PI / 180;
    let lat2 = p2[0] * Math.PI / 180;

    let lon1 = p1[1] * Math.PI / 180;
    let lon2 = p2[1] * Math.PI / 180;

    let y = Math.sin(lon2 - lon1) * Math.cos(lat2);

    let x =
        Math.cos(lat1) * Math.sin(lat2) -
        Math.sin(lat1) * Math.cos(lat2) *
        Math.cos(lon2 - lon1);

    return Math.atan2(y, x) * 180 / Math.PI;
}

async function startNavigation() {

    speak("Starting navigation to Lucknow, Uttar Pradesh, India");

    let lastBearing = getBearing(routeData[0], routeData[1]);

    for (let i = 0; i < routeData.length - 1; i++) {

        let p1 = routeData[i];
        let p2 = routeData[i+1];

        let bearing = getBearing(p1, p2);

        let diff = Math.abs(bearing - lastBearing);

        if (diff > 180)
            diff = 360 - diff;

        if (diff > 22) {

            document.getElementById('alert').style.display = 'block';

            speak("Sharp curve ahead");

            setTimeout(() => {
                document.getElementById('alert').style.display = 'none';
            }, 2000);
        }

        let steps = 10;

        for (let s = 1; s <= steps; s++) {

            let lat =
                p1[0] + (p2[0] - p1[0]) * (s / steps);

            let lng =
                p1[1] + (p2[1] - p1[1]) * (s / steps);

            marker.setLatLng([lat, lng]);

            map.panTo([lat, lng], {
                animate: false
            });

            document.getElementById('car-img')
            .style.transform = `rotate(${bearing}deg)`;

            await new Promise(r =>
                setTimeout(r, 120 / steps)
            );
        }

        lastBearing = bearing;
    }

    document.getElementById('status').innerText =
    "● DESTINATION REACHED";

    speak("You have arrived");
}

setTimeout(startNavigation, 3000);
